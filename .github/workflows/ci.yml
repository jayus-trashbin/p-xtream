name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Type Check + Unit Tests ─────────────────────────────────────
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for turbo --filter=[HEAD^1]

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9.14.4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prisma Generate (required before build)
        run: |
          mkdir -p apps/backend/.nitro/types
          echo '{"compilerOptions":{"forceConsistentCasingInFileNames":true,"strict":false,"noEmit":true,"skipLibCheck":true,"target":"ESNext","module":"ESNext","moduleResolution":"Bundler","allowJs":true,"resolveJsonModule":true,"allowSyntheticDefaultImports":true},"include":["../../**/*"]}' > apps/backend/.nitro/types/tsconfig.json
          cd apps/backend && npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Lint
        run: pnpm turbo lint --filter=[HEAD^1]
        continue-on-error: true

      - name: Type Check
        run: pnpm turbo type-check --filter=[HEAD^1]
        continue-on-error: true

      - name: Test (unit only — no DB required)
        run: pnpm turbo test --filter=[HEAD^1]
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET || 'ci-placeholder-secret-64-chars-long-padding-here-1234' }}

  # ── 2. Build Verification ─────────────────────────────────────────────────
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: [ci]
    # Only run on push to main (not on PRs, to save minutes)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9.14.4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Build packages first (providers is a dep of web)
      - name: Build packages/providers
        run: pnpm --filter @p-stream/providers build

      # Build backend (Nitro)
      - name: Build backend
        run: |
          mkdir -p apps/backend/.nitro/types
          echo '{"compilerOptions":{"forceConsistentCasingInFileNames":true,"strict":false,"noEmit":true,"skipLibCheck":true,"target":"ESNext","module":"ESNext","moduleResolution":"Bundler","allowJs":true,"resolveJsonModule":true,"allowSyntheticDefaultImports":true},"include":["../../**/*"]}' > apps/backend/.nitro/types/tsconfig.json
          cd apps/backend
          npx prisma generate
          pnpm build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET || 'ci-placeholder-secret-for-build-only' }}

      # Build proxy (Nitro)
      - name: Build proxy
        run: pnpm --filter @p-stream/proxy build

      # Build web (Vite SPA) — uses production env vars
      - name: Build web
        run: pnpm --filter @p-stream/web build
        env:
          VITE_TMDB_READ_API_KEY: ${{ secrets.VITE_TMDB_READ_API_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_CORS_PROXY_URL: ${{ secrets.VITE_CORS_PROXY_URL }}
          VITE_M3U8_PROXY_URL: ${{ secrets.VITE_M3U8_PROXY_URL }}
          VITE_APP_DOMAIN: "https://p-xtream-app.netlify.app"
          VITE_PWA_ENABLED: "true"
          VITE_NORMAL_ROUTER: "true"

      # ── 3. Deploy to Netlify ─────────────────────────────────────────────────
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=apps/web/dist --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
