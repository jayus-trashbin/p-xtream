name: CI / CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Type Check + Unit Tests ─────────────────────────────────────
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for turbo --filter=[HEAD^1]

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint --filter=[HEAD^1]

      - name: Type Check
        run: pnpm turbo type-check --filter=[HEAD^1]

      - name: Test (unit only — no DB required)
        run: pnpm turbo test --filter=[HEAD^1]
        env:
          NODE_ENV: test
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET || 'ci-placeholder-secret-64-chars-long-padding-here-1234' }}

  # ── 2. Build & Push Docker images to GHCR ─────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Only build images on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci]

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: docker/Dockerfile.backend
            image: backend
          - service: proxy
            dockerfile: docker/Dockerfile.proxy
            image: proxy
          - service: web
            dockerfile: docker/Dockerfile.web
            image: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=true
            type=ref,event=branch

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Mount pnpm/npm cache for faster CI builds
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            VITE_TMDB_API_KEY=${{ secrets.VITE_TMDB_API_KEY }}
            VITE_TMDB_READ_API_KEY=${{ secrets.VITE_TMDB_READ_API_KEY }}
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            VITE_PROXY_URL=${{ secrets.VITE_PROXY_URL }}
            VITE_M3U8_PROXY_URL=${{ secrets.VITE_M3U8_PROXY_URL }}
            VITE_PWA_ENABLED=true
