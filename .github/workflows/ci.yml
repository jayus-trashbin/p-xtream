name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Type Check + Unit Tests ─────────────────────────────────────
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for turbo --filter=[HEAD^1]

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma Generate (required before build)
        run: cd apps/backend && npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Lint
        run: pnpm turbo lint --filter=[HEAD^1]
        continue-on-error: true

      - name: Type Check
        run: pnpm turbo type-check --filter=[HEAD^1]
        continue-on-error: true

      - name: Test (unit only — no DB required)
        run: pnpm turbo test --filter=[HEAD^1]
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET || 'ci-placeholder-secret-64-chars-long-padding-here-1234' }}

  # ── 2. Build Verification ─────────────────────────────────────────────────
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: [ci]
    # Only run on push to main (not on PRs, to save minutes)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build packages first (providers is a dep of web)
      - name: Build packages/providers
        run: pnpm --filter @p-stream/providers build

      # Build backend (Nitro)
      - name: Build backend
        run: |
          cd apps/backend
          npx prisma generate
          pnpm build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET || 'ci-placeholder-secret-for-build-only' }}

      # Build proxy (Nitro)
      - name: Build proxy
        run: pnpm --filter @p-stream/proxy build

      # Build web (Vite SPA) — uses production env vars
      - name: Build web
        run: pnpm --filter @p-stream/web build
        env:
          VITE_TMDB_READ_API_KEY: ${{ secrets.VITE_TMDB_READ_API_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL || 'https://p-stream-backend.onrender.com' }}
          VITE_CORS_PROXY_URL: ${{ secrets.VITE_CORS_PROXY_URL || 'https://p-stream-proxy.onrender.com' }}
          VITE_M3U8_PROXY_URL: ${{ secrets.VITE_M3U8_PROXY_URL || 'https://p-stream-proxy.onrender.com' }}
