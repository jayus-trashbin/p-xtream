name: Provider Health Check

# Runs weekly at 00:00 UTC on Mondays
on:
  schedule:
    - cron: '0 0 * * 1'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  health:
    name: Weekly Provider Health Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build providers package
        run: pnpm --filter @p-stream/providers build

      - name: Run provider health tests
        run: pnpm --filter @p-stream/providers test
        env:
          # Signals vitest to run the health check tests (which are skipped in normal CI)
          VITEST_HEALTH: true
          # Allow longer timeout — real scrape tests can take up to 2 min
          VITEST_TIMEOUT: 120000

      - name: Run provider health CLI
        run: pnpm --filter @p-stream/providers health
        # Continue even if some providers fail — report is the goal
        continue-on-error: true

      # Create or update a GitHub Issue if health degrades below 60%
      - name: Report results (on failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = `## ⚠️ Provider Health Degraded\n\nThe weekly provider health check failed.\n\n**Run:** ${runUrl}\n\nAt least 60% of providers must be healthy. Please investigate and fix failing providers.\n\n> Auto-generated by \`provider-health.yml\` workflow`;

            // Search for an existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'provider-health',
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ Provider Health Degraded',
                body,
                labels: ['provider-health', 'bug'],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `**Update ${new Date().toISOString()}:** Health check failed again.\n\n**Run:** ${runUrl}`,
              });
            }
