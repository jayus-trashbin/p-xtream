[build]
publish = "C:\\Users\\ewkek\\Documents\\Organização\\Projetos\\p-stream\\p-xtream\\apps\\web\\apps\\web\\dist"
publishOrigin = "config"
commandOrigin = "config"
base = "C:\\Users\\ewkek\\Documents\\Organização\\Projetos\\p-stream\\p-xtream\\apps\\web"
command = "npm install -g pnpm@9 && pnpm install --frozen-lockfile --filter @p-stream/providers... --filter @p-stream/web... && pnpm --filter @p-stream/providers build && pnpm --filter @p-stream/web build"

[build.environment]
NODE_VERSION = "20"
PNPM_VERSION = "9"
CI = "true"
VITE_PWA_ENABLED = "true"
VITE_NORMAL_ROUTER = "true"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "origin-when-cross-origin"
Cache-Control = "public, max-age=0, s-maxage=0, must-revalidate"

[[headers]]
for = "/manifest.webmanifest"

[headers.values]
Content-Type = "application/manifest+json"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, s-maxage=31536000, immutable"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Feature-Policy = "fullscreen *"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/locales/*"

[headers.values]
Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
for = "/sw.js"

[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/manifest.webmanifest"

[headers.values]
Content-Type = "application/manifest+json"
Cache-Control = "no-cache"

[[redirects]]
from = "/assets/*"
to = "/assets/:splat"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/*"
to = "/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]